variables:
  BUILD_DIR: dist
  ANDROID_BASE64_KEY: "Tm90IHZhbGlkIHRlc3Rpbmcga2V5" # Not valid testing key
  CORDOVA_BUILD_JSON: "notPresent.json"

stages:
  - test

test:
  stage: test
  tags:
    - dind
  image: androidsdk/android-29
  allow_failure: true
  before_script:
    - apt-get update -y && apt-get install -y gradle jq wget openjdk-8-jdk-headless
    - apt-get install -y libasound2 libatk-bridge2.0-0 libatk1.0-0 libatomic1 libatspi2.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libdrm2 libevent-dev libexpat1 libflac8 libfontconfig1 libfreetype6 libgbm1 libgcc1 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libharfbuzz0b libjsoncpp1 liblcms2-2 libminizip1 libnspr4 libnss3 libopenjp2-7 libopus0 libpango-1.0-0 libpng16-16 libpulse0 libsnappy1v5 libstdc++6 libvpx5 libwebp6 libwebpdemux2 libwebpmux3 libx11-6 libxcb1 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxml2 libxrandr2 libxslt1.1 zlib1g #Install chromium dependencies
    - wget -qO - https://nodejs.org/dist/v12.14.1/node-v12.14.1-linux-x64.tar.xz | tar -xJ -C /tmp && cp -al /tmp/node-v12.14.1-linux-x64/* /usr/local
  script:
    - cd apache-cordova/arsnova-click-app
    - echo $ANDROID_BASE64_KEY | base64 --decode > android-key.jks
    - ln -s -T "$CORDOVA_BUILD_JSON" ./build.json
