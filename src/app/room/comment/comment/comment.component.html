<mat-card class="comment-card">
  <mat-card-header style="flex-wrap: wrap">
    @if (icon(); as icon) {
      <mat-icon
        mat-card-avatar
        [matTooltip]="icon[1]"
        class="avatar">
        {{ icon[0] }}
      </mat-icon>
    }
    <mat-card-title class="title">{{ header()[0] }}</mat-card-title>
    <mat-card-subtitle
      class="slim-title"
      [matTooltip]="i18n().subTitleTooltip | context: formattedDate()">
      {{ header()[1] }}
    </mat-card-subtitle>
    <span style="flex: 1"></span>
    <app-comment-header-action
      [comment]="comment()"></app-comment-header-action>
  </mat-card-header>

  <mat-card-content class="card-content">
    <div class="content-vote-wrapper">
      <div class="content-wrapper">
        <app-comment-filter
          (filterSelect)="selectFilter($event)"
          [comment]="comment()"></app-comment-filter>
        <div
          #contentWrapper
          [class.cut]="isTaller() && !isExpanded()">
          <app-markdown-viewer [data]="comment().body"></app-markdown-viewer>
        </div>
        @if (isTaller()) {
          <button
            style="width: 100%"
            mat-button
            (click)="expandSwitch()">
            <mat-icon>
              {{ isExpanded() ? "arrow_upward" : "arrow_downward" }}
            </mat-icon>
            {{ isExpanded() ? "Weniger anzeigen" : "Mehr anzeigen" }}
          </button>
        }
      </div>
      <app-comment-vote [comment]="comment()"></app-comment-vote>
    </div>
  </mat-card-content>

  <mat-card-actions style="gap: 0.5em; justify-content: space-between">
    <!-- flex-wrap: wrap;  -->
    <button
      mat-icon-button
      [matTooltip]="'Antwort schreiben'">
      <mat-icon>reply</mat-icon>
    </button>
    <button
      mat-icon-button
      [matTooltip]="'Zur vorherigen Frage'">
      <mat-icon>unfold_less</mat-icon>
    </button>
    <!-- <button
      mat-icon-button
      [matTooltip]="'Antworten anzeigen'">
      <mat-icon>comment</mat-icon>
    </button> -->
    <button
      mat-icon-button
      [matTooltip]="'Benachrichtigen'">
      <mat-icon>notifications_off</mat-icon>
    </button>
    <button
      style="margin-right: 0.25em"
      mat-icon-button
      class="contained-icon primary ai-button"
      [matTooltip]="'KI antworten lassen'">
      <mat-icon svgIcon="fj_robot"></mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
