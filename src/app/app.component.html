<header #headerElement>
  <app-header #header></app-header>
</header>
<div
  id="scroll_container"
  #scrollElement
  (scroll)="onScroll()">
  <router-outlet></router-outlet>
</div>
<footer
  role="contentinfo"
  #footerElement>
  <app-footer></app-footer>
</footer>
<div id="debugger">
  <button (click)="__debugger.toggleHighlight()">highlight</button>
  <button (click)="__debugger.toggleBorder()">border</button>
  <button (click)="__debugger.toggleDarkLight()">dark/light</button>
</div>
