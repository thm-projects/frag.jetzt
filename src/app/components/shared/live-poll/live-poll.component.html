<ng-container>
  <div style="width:100%;height:100%;overflow:hidden;">
    <div id="livePollExpander"></div>
  </div>
</ng-container>
<ng-container *ngIf="isLoaded">
  <ars-screen ars-flex-box class="livePoll-main">
    <ars-row ars-flex-box [borderBox]="true" [padding]="8">
      <button mat-icon-button (click)="close()">
        <mat-icon class="colors-foreground">arrow_back</mat-icon>
      </button>
    </ars-row>
    <ars-fill ars-flex-box [align]="'center'">
      <ars-col ars-flex-box class="fade-in-animation-wrapper" [size]="800" [align]="'flex-start'" [inset]="true">
        <ars-fill></ars-fill>
        <ng-container *ngIf="!session"><p>Loading Sessions</p></ng-container>
        <ng-container *ngIf="session">
<!--          User is creator-->
          <ng-container *ngIf="this.user.role">
<!--            Create new Live Poll-->
            <ng-container *ngIf="isCreate">
              <app-live-poll-create (submitEmit)="createNewLivePoll($event);isCreate=false;"></app-live-poll-create>
            </ng-container>
            <ng-container *ngIf="!isCreate">
              <ng-container *ngIf="session.hasActiveLivePoll">
                <app-live-poll-view [data]="data"></app-live-poll-view>
              </ng-container>
              <ng-container *ngIf="!session.hasActiveLivePoll">
                <ng-container *ngIf="!session.previousLivePoll&&!session.currentLivePoll">
                  <ars-row>
                    <h1>You have not created a Live-Poll yet. Do you want to create one?</h1>
                  </ars-row>
                  <ars-row>
                    <button mat-button
                            aria-describedby="stop-label" style="color:var(--on-surface);padding:0 8px;"
                            (click)="createLivePoll()"
                            [matTooltip]="'live-poll.stop-accessibility' | translate">
                      <mat-icon style="color:var(--on-surface);padding-right:4px;">face</mat-icon>
                      <span *ngIf="device.isCurrentlyDesktop">Create</span>
                    </button>
                  </ars-row>
                </ng-container>
                <ars-row>
                  <ng-container *ngIf="session.currentLivePoll&&!session.currentLivePoll.closed">
                    <button mat-button
                            aria-describedby="stop-label" style="color:var(--on-surface);padding:0 8px;"
                            (click)="startLivePoll()"
                            [matTooltip]="'live-poll.stop-accessibility' | translate">
                      <mat-icon style="color:var(--on-surface);padding-right:4px;">face</mat-icon>
                      <span *ngIf="device.isCurrentlyDesktop">Start</span>
                    </button>
                  </ng-container>
                </ars-row>
              </ng-container>
            </ng-container>
          </ng-container>
          <ng-container *ngIf="!this.user.role">
<!--            Participant-->
            <ng-container *ngIf="session.hasActiveLivePoll">
              <app-live-poll-view [data]="data"></app-live-poll-view>
            </ng-container>
            <ng-container *ngIf="!session.hasActiveLivePoll">
              <h1>No active Live-Polls. Come back later.</h1>
              <button (click)="debug_force();">_debug force live-poll</button>
            </ng-container>
          </ng-container>
        </ng-container>
        <ars-fill></ars-fill>
      </ars-col>
    </ars-fill>
    <ars-row ars-flex-box [borderBox]="true" [padding]="8" [direction]="'row'" [align]="'flex-start'">
<!--      <ng-container *ngFor="let x of [-->
<!--        'search','favorite_border',-->
<!--        'lock','schedule','language','help_outline'-->
<!--        ]">-->
<!--        <button mat-icon-button (click)="close()">-->
<!--          <mat-icon class="colors-foreground">{{x}}</mat-icon>-->
<!--        </button>-->
<!--      </ng-container>-->
<!--      <ars-fill></ars-fill>-->
<!--      <ng-container *ngFor="let x of [-->
<!--        'search','favorite_border',-->
<!--        'lock','schedule','language','help_outline'-->
<!--        ]">-->
<!--        <button mat-icon-button (click)="close()">-->
<!--          <mat-icon class="colors-foreground">{{x}}</mat-icon>-->
<!--        </button>-->
<!--      </ng-container>-->
    </ars-row>
  </ars-screen>

</ng-container>

<div class="visually-hidden">
  <div *ngFor="let lbl of ['title','start','stop','compare']"
       id="{{lbl+'-label'}}">{{('live-poll.' + lbl + '-accessibility') | translate}}</div>
</div>
