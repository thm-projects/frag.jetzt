<mat-form-field appearance="outline">
    <mat-label>DD/MM/YY</mat-label>
    <input matInput type="datetime-local" placeholder="start date">
</mat-form-field>

<div class="container">
    <mat-form-field appearance="outline">
        <mat-label>Wiederholen</mat-label>
        <input matInput placeholder="Placeholder" type="number">
    </mat-form-field>
    
    <mat-form-field>
        <mat-select>
            <mat-option *ngFor="let option of options" [value]="option.value">
                {{option.i18nPath | translate}}
            </mat-option>
        </mat-select>
    </mat-form-field>
</div>

<button mat-raised-button>Create</button>
