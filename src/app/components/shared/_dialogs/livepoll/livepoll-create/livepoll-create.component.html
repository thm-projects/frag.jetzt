<h1 mat-dialog-title>
  {{ translateKey + ".create-dialog-title" | translate }}
</h1>
<mat-dialog-content class="content">
  <app-livepoll-template-builder
    [livepollSession]="livepollConfiguration"
    [templateSelection]="templateSelection"></app-livepoll-template-builder>

  <app-livepoll-dialog
    [template]="templateSelection.value"
    [livepollSession]="livepollConfiguration"
    [valueChange]="templateSelection.valueChanges"></app-livepoll-dialog>
</mat-dialog-content>

<mat-dialog-actions style="display: flex; justify-content: space-between">
  <button
    mat-flat-button
    color="warn"
    class="previewOption"
    (click)="dialogRef.close()">
    <span>{{ translateKey + ".close" | translate }}</span>
  </button>
  <button
    (click)="create()"
    mat-flat-button
    color="accent"
    class="previewOption">
    <span>{{ translateKey + ".create" | translate }}</span>
  </button>
</mat-dialog-actions>
