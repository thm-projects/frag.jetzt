<ng-container>
  <div mat-dialog-content>
    <ars-row ars-flex-box>
      <ars-col>
        <h2>Message of the Day</h2>
      </ars-col>
      <ars-fill></ars-fill>
      <ars-col>
        <h3>{{motd.date.getDay()+'.'+motd.date.getMonth()+'.'+motd.date.getFullYear()}}</h3>
      </ars-col>
    </ars-row>
    <ars-row>
      <mat-divider></mat-divider>
    </ars-row>
    <ars-row>
      <markdown class="images" [data]="motd[currentLang]"></markdown>
    </ars-row>
    <ars-row>
      <mat-checkbox (change)="setDismiss($event);">Don't show again</mat-checkbox>
    </ars-row>
  </div>
  <app-dialog-action-buttons
    [spacing]="false"
    [buttonsLabelSection]="'imprint'"
    [cancelButtonClickAction]="buildCloseDialogActionCallback()">
  </app-dialog-action-buttons>
</ng-container>
