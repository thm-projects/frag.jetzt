<ng-container>
  <div class="content-container">
    <div class="settings-container">
      <div>
        <mat-button-toggle-group
          [(ngModel)]="currentTheme"
          (change)="setTheme()">
          <mat-button-toggle
            [value]="theme"
            *ngFor="let theme of themeList">
            {{ theme }}
          </mat-button-toggle>
        </mat-button-toggle-group>
      </div>
    </div>
    <div class="example-container">
      <mat-accordion [multi]="true">
        <mat-expansion-panel
          [expanded]="true"
          [ngStyle]="{
            backgroundColor: 'var(--surface)'
          }">
          <mat-expansion-panel-header>
            <h3>Buttons</h3>
          </mat-expansion-panel-header>
          <a href="https://material.angular.io/components/button/examples">
            https://material.angular.io/components/button/examples
          </a>
          <app-component-test-button></app-component-test-button>
        </mat-expansion-panel>
        <mat-expansion-panel [expanded]="true">
          <mat-expansion-panel-header>
            <h3>Card</h3>
          </mat-expansion-panel-header>
          <a href="https://material.angular.io/components/card/examples">
            https://material.angular.io/components/card/examples
          </a>
          <app-component-test-card></app-component-test-card>
        </mat-expansion-panel>
      </mat-accordion>
    </div>
    <app-markdown-editor></app-markdown-editor>
  </div>
</ng-container>
<ng-template
  #colorIndicator
  let-color="color">
  <div
    [class.mat-elevation-z1]="true"
    [class.color-indicator]="true"
    [ngStyle]="{
      backgroundColor: 'var(--' + color + ')'
    }"></div>
</ng-template>
